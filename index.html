<script>

var map = L.map('map').setView([15.5, 32.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let savedEvents = JSON.parse(localStorage.getItem("events")) || [];

/* =========================
   EVENTS LAYER (POINTS)
========================= */
function loadEvents() {

  fetch('events.geojson')
    .then(res => res.json())
    .then(data => {

      let combined = {
        type: "FeatureCollection",
        features: data.features.concat(savedEvents)
      };

      L.geoJSON(combined, {
        pointToLayer: function (feature, latlng) {

          let color = "blue";

          if (feature.properties.type === "clash") color = "red";
          if (feature.properties.type === "movement") color = "orange";
          if (feature.properties.type === "airstrike") color = "black";

          return L.circleMarker(latlng, {
            radius: 6,
            fillColor: color,
            color: "#000",
            weight: 1,
            fillOpacity: 0.8
          });
        },

        onEachFeature: function (feature, layer) {
          layer.bindPopup(
            "<b>" + feature.properties.title + "</b><br>" +
            (feature.properties.description || "")
          );
        }

      }).addTo(map);

    });
}

/* =========================
   FRONTLINES LAYER (LINES)
========================= */
function loadFrontlines() {

  fetch('frontlines.geojson')
    .then(res => res.json())
    .then(data => {

      L.geoJSON(data, {

        style: function(feature) {

          let faction = feature.properties.faction;

          let color = "gray";
          if (faction === "SAF") color = "blue";
          if (faction === "RSF") color = "orange";

          return {
            color: color,
            weight: 3
          };
        },

        onEachFeature: function(feature, layer) {
          layer.bindPopup(
            "<b>" + feature.properties.name + "</b><br>" +
            feature.properties.faction
          );
        }

      }).addTo(map);

    });
}

/* =========================
   CONTROL ZONES (POLYGONS)
========================= */
function loadControl() {

  fetch('control.geojson')
    .then(res => res.json())
    .then(data => {

      L.geoJSON(data, {

        style: function(feature) {

          let faction = feature.properties.faction;

          let color = "gray";
          if (faction === "SAF") color = "blue";
          if (faction === "RSF") color = "orange";

          return {
            color: color,
            fillColor: color,
            fillOpacity: 0.2,
            weight: 2
          };
        },

        onEachFeature: function(feature, layer) {
          layer.bindPopup(
            "<b>" + feature.properties.name + "</b><br>" +
            feature.properties.faction
          );
        }

      }).addTo(map);

    });
}

/* =========================
   INIT ALL LAYERS
========================= */
loadEvents();
loadFrontlines();
loadControl();

</script>
