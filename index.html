<!DOCTYPE html>
<html>
<head>
  <title>Sudan Conflict Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

  // Initialize map
  var map = L.map('map').setView([15.5, 32.5], 6);

  // Base layer
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // --------------------
  // EVENTS (POINTS)
  // --------------------
  fetch('events.geojson')
    .then(res => res.json())
    .then(data => {

      var eventsLayer = L.geoJSON(data, {

        pointToLayer: function (feature, latlng) {
          let color = "blue";

          if (feature.properties.type === "clash") color = "red";
          if (feature.properties.type === "movement") color = "orange";
          if (feature.properties.type === "airstrike") color = "black";

          return L.circleMarker(latlng, {
            radius: 8,
            fillColor: color,
            color: "#000",
            weight: 1,
            fillOpacity: 0.8
          });
        },

        onEachFeature: function (feature, layer) {
  onEachFeature: function (feature, layer) {

  let confidence = feature.properties.confidence;
  let confColor = "gray";

  if (confidence === "high") confColor = "green";
  if (confidence === "medium") confColor = "orange";
  if (confidence === "low") confColor = "red";

  layer.bindPopup(
    "<b>" + feature.properties.title + "</b><br>" +
    "<b>Type:</b> " + feature.properties.type + "<br>" +
    "<b>Faction:</b> " + feature.properties.faction + "<br>" +
    "<b>Description:</b> " + feature.properties.description + "<br>" +
    "<b>Date:</b> " + feature.properties.date + "<br>" +
    "<b>Confidence:</b> <span style='color:" + confColor + "'>" + confidence + "</span><br>" +
    "<b>Source:</b> " + feature.properties.source
  );
}
      }).addTo(map);

    });

  // --------------------
  // FRONTLINES (LINES)
  // --------------------
  fetch('frontlines.geojson')
    .then(res => res.json())
    .then(data => {

      var frontlineLayer = L.geoJSON(data, {

        style: function(feature) {

          let faction = feature.properties.faction;
          let color = "red";

          if (faction === "RSF") color = "orange";
          if (faction === "SAF") color = "blue";

          return {
            color: color,
            weight: 4
          };
        },

        onEachFeature: function (feature, layer) {
  layer.bindPopup(
    "<b>" + feature.properties.name + "</b><br>" +
    "<b>Faction:</b> " + feature.properties.faction + "<br>" +
    "<b>Date:</b> " + feature.properties.date + "<br>" +
    "<b>Confidence:</b> " + feature.properties.confidence
  );
}
      }).addTo(map);

    });

  // --------------------
  // CONTROL (POLYGONS)
  // --------------------
  fetch('control.geojson')
    .then(res => res.json())
    .then(data => {

      var controlLayer = L.geoJSON(data, {

        style: function(feature) {

          let faction = feature.properties.faction;
          let status = feature.properties.status;

          let color = "gray";

          if (faction === "RSF") color = "orange";
          if (faction === "SAF") color = "blue";
          if (faction === "contested") color = "purple";

          let fillOpacity = 0.2;
          if (status === "contested") fillOpacity = 0.1;

          return {
            color: color,
            fillColor: color,
            fillOpacity: fillOpacity,
            weight: 2
          };
        },

        onEachFeature: function (feature, layer) {
  layer.bindPopup(
    "<b>" + feature.properties.name + "</b><br>" +
    "<b>Faction:</b> " + feature.properties.faction + "<br>" +
    "<b>Status:</b> " + feature.properties.status + "<br>" +
    "<b>Date:</b> " + feature.properties.date + "<br>" +
    "<b>Confidence:</b> " + feature.properties.confidence
  );
}

      }).addTo(map);

    });

</script>

</body>
</html>
