<script>

console.log("MAP SCRIPT LOADED");

// =========================
// MAP INIT
// =========================
var map = L.map('map').setView([15.5, 32.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// =========================
// LAYER GROUPS (IMPORTANT)
// =========================
let eventsLayer = L.layerGroup();
let frontlinesLayer = L.layerGroup();

// =========================
// EVENTS
// =========================
fetch('events.geojson')
  .then(res => res.json())
  .then(data => {

    let geo = L.geoJSON(data, {
      pointToLayer: function (feature, latlng) {

        let color = "blue";

        if (feature.properties?.type === "clash") color = "red";
        if (feature.properties?.type === "movement") color = "orange";
        if (feature.properties?.type === "airstrike") color = "black";

        return L.circleMarker(latlng, {
          radius: 6,
          fillColor: color,
          color: "#000",
          weight: 1,
          fillOpacity: 0.8
        });
      },

      onEachFeature: function (feature, layer) {
        layer.bindPopup(
          "<b>" + (feature.properties?.title || "No title") + "</b><br>" +
          (feature.properties?.description || "")
        );
      }
    });

    eventsLayer.addLayer(geo);
    eventsLayer.addTo(map);

  });

// =========================
// FRONTLINES
// =========================
fetch('frontlines.geojson')
  .then(res => res.json())
  .then(data => {

    let geo = L.geoJSON(data, {

      style: function(feature) {

        let faction = feature.properties?.faction;

        let color = "gray";
        if (faction === "SAF") color = "blue";
        if (faction === "RSF") color = "orange";

        return {
          color: color,
          weight: 3
        };
      },

      onEachFeature: function(feature, layer) {
        layer.bindPopup(
          "<b>" + (feature.properties?.name || "Frontline") + "</b><br>" +
          "Faction: " + (feature.properties?.faction || "unknown")
        );
      }

    });

    frontlinesLayer.addLayer(geo);
    frontlinesLayer.addTo(map);

  });

// =========================
// LAYER CONTROL PANEL
// =========================
let overlayMaps = {
  "Events": eventsLayer,
  "Frontlines": frontlinesLayer
};

L.control.layers(null, overlayMaps, {
  collapsed: false
}).addTo(map);

</script>
