<script>

var map = L.map('map').setView([15.5, 32.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let savedEvents = JSON.parse(localStorage.getItem("events")) || [];

/* =========================
   SAFE LOADER FUNCTION
========================= */
function safeLoad(url, callback) {
  fetch(url)
    .then(res => {
      if (!res.ok) throw new Error("HTTP error " + res.status + " for " + url);
      return res.json();
    })
    .then(data => callback(data))
    .catch(err => {
      console.log("LOAD FAILED:", url, err);
    });
}

/* =========================
   EVENTS LAYER
========================= */
function loadEvents(data) {

  let features = data.features || [];

  let combined = {
    type: "FeatureCollection",
    features: features.concat(savedEvents)
  };

  L.geoJSON(combined, {
    pointToLayer: function (feature, latlng) {

      let color = "blue";

      if (feature.properties?.type === "clash") color = "red";
      if (feature.properties?.type === "movement") color = "orange";
      if (feature.properties?.type === "airstrike") color = "black";

      return L.circleMarker(latlng, {
        radius: 6,
        fillColor: color,
        color: "#000",
        weight: 1,
        fillOpacity: 0.8
      });
    },

    onEachFeature: function (feature, layer) {
      layer.bindPopup(
        "<b>" + (feature.properties?.title || "No title") + "</b><br>" +
        (feature.properties?.description || "")
      );
    }

  }).addTo(map);
}

/* =========================
   FRONTLINES
========================= */
function loadFrontlines(data) {

  L.geoJSON(data, {

    style: function(feature) {

      let faction = feature.properties?.faction;

      let color = "gray";
      if (faction === "SAF") color = "blue";
      if (faction === "RSF") color = "orange";

      return {
        color: color,
        weight: 3
      };
    }

  }).addTo(map);
}

/* =========================
   CONTROL ZONES
========================= */
function loadControl(data) {

  L.geoJSON(data, {

    style: function(feature) {

      let faction = feature.properties?.faction;

      let color = "gray";
      if (faction === "SAF") color = "blue";
      if (faction === "RSF") color = "orange";

      return {
        color: color,
        fillColor: color,
        fillOpacity: 0.2,
        weight: 2
      };
    }

  }).addTo(map);
}

/* =========================
   INIT (SAFE SEQUENCED LOAD)
========================= */
safeLoad('events.geojson', loadEvents);
safeLoad('frontlines.geojson', loadFrontlines);
safeLoad('control.geojson', loadControl);

</script>
