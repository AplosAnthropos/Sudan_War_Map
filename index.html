<!DOCTYPE html>
<html>
<head>
  <title>Sudan Conflict Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map { height: 100vh; margin: 0; padding: 0; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

console.log("MAP SCRIPT LOADED");

// =========================
// MAP INIT
// =========================
var map = L.map('map').setView([15.5, 32.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// =========================
// EVENTS LAYER
// =========================
fetch('events.geojson')
  .then(res => res.json())
  .then(data => {

    L.geoJSON(data, {
      pointToLayer: function (feature, latlng) {

        let color = "blue";

        if (feature.properties?.type === "clash") color = "red";
        if (feature.properties?.type === "movement") color = "orange";
        if (feature.properties?.type === "airstrike") color = "black";

        return L.circleMarker(latlng, {
          radius: 6,
          fillColor: color,
          color: "#000",
          weight: 1,
          fillOpacity: 0.8
        });
      },

      onEachFeature: function (feature, layer) {
        layer.bindPopup(
          "<b>" + (feature.properties?.title || "No title") + "</b><br>" +
          (feature.properties?.description || "")
        );
      }
    }).addTo(map);

  })
  .catch(err => console.log("EVENTS ERROR:", err));

// =========================
// FRONTLINES (BATTLE LINES)
// =========================
fetch('frontlines.geojson')
  .then(res => res.json())
  .then(data => {

    L.geoJSON(data, {

      style: function(feature) {

        let faction = feature.properties?.faction;

        let color = "gray";
        if (faction === "SAF") color = "blue";
        if (faction === "RSF") color = "orange";

        return {
          color: color,
          weight: 3
        };
      },

      onEachFeature: function(feature, layer) {
        layer.bindPopup(
          "<b>" + (feature.properties?.name || "Frontline") + "</b><br>" +
          "Faction: " + (feature.properties?.faction || "unknown")
        );
      }

    }).addTo(map);

  })
  .catch(err => console.log("FRONTLINES ERROR:", err));

</script>

</body>
</html>
