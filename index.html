<script>

var map = L.map('map').setView([15.5, 32.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// simple test marker so you KNOW map is working
L.circleMarker([15.5, 32.5], {
  radius: 8,
  color: "red",
  fillColor: "red",
  fillOpacity: 0.8
}).addTo(map);

</script>
